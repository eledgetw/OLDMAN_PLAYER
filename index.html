<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">OLDMAN'S Player - 老人的播放器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    <style>
        /* 隱藏預設卷軸讓版面乾淨 */
        ::-webkit-scrollbar { display: none; }
        .clip-segment { transition: background-color 0.1s; }
        .clip-segment.selected { border: 2px solid #3b82f6; background-color: rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="bg-gray-900 text-white h-[100dvh] flex flex-col overflow-hidden font-sans pb-2">

    <!-- 頂部導覽與控制區 -->
    <header class="bg-gray-800 p-4 flex flex-wrap gap-4 items-center border-b border-gray-700 shadow-md z-10">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
            <span data-i18n="appTitle">老人的播放器</span>
        </h1>
        <div class="flex items-center gap-2">
            <input type="file" id="video-upload" accept="video/*" class="hidden">
            <button onclick="document.getElementById('video-upload').click()" data-i18n="loadVideo" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1 rounded-lg text-sm">載入影片</button>
            <input type="file" id="import-input" accept=".json,video/*,.pdf" multiple class="hidden">
            <button id="export-btn" data-i18n="export" class="bg-green-700 hover:bg-green-600 text-white px-3 py-1 rounded-lg text-sm">匯出</button>
            <button id="import-btn" data-i18n="import" class="bg-green-700 hover:bg-green-600 text-white px-3 py-1 rounded-lg text-sm" onclick="document.getElementById('import-input').click()">匯入</button>
            <button id="sheet-music-btn" class="bg-purple-600 hover:bg-purple-500 text-white px-3 py-1 rounded-lg text-sm hidden flex items-center gap-1 shadow" title="開啟樂譜"><svg class="w-4 h-4 text-yellow-300" fill="currentColor" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 13H9.5v-1.25c0-.62-.5-1.12-1.12-1.12H8.25V11.5h3.25V15zM13 9V3.5L18.5 9H13z"/></svg>樂譜</button>
            <button id="undo-btn" class="p-2 rounded-lg bg-gray-600 hover:bg-gray-500 text-white transition-colors" title="上一動 (Ctrl+Z)"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg></button>
            <button id="redo-btn" class="p-2 rounded-lg bg-gray-600 hover:bg-gray-500 text-white transition-colors" title="下一動 (Ctrl+Y)"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 10h-10a8 8 0 00-8 8v2M21 10l-6 6m6-6l-6-6"/></svg></button>
            <button id="preview-toggle" class="p-2 rounded-lg bg-green-600 text-white"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg></button>
        </div>
        <div id="speed-buttons" class="flex items-center gap-1 bg-gray-700 p-1 rounded-lg">
            <span id="speed-display" class="text-xs font-mono px-2">1.0x</span>
            <input type="range" id="speed-slider" min="0.1" max="4" step="0.1" value="1" class="w-16 h-1 accent-blue-500">
        </div>
        <div class="ml-auto flex bg-gray-700 rounded-lg overflow-hidden border border-gray-600">
            <button id="lang-tw" class="px-3 py-1 text-sm bg-blue-600 text-white font-bold transition-colors" onclick="setLang('tw')">中文</button>
            <button id="lang-en" class="px-3 py-1 text-sm text-gray-300 hover:bg-gray-600 font-bold transition-colors" onclick="setLang('en')">ENG</button>
        </div>
    </header>

    <main class="flex-1 min-h-0 flex justify-center items-center bg-black relative p-4">
        <video id="video-player" class="max-h-full max-w-full rounded shadow-lg object-contain transition-opacity duration-200 cursor-pointer" playsinline></video>
        
        <div id="play-pause-overlay" class="absolute inset-0 flex items-center justify-center pointer-events-none z-50 opacity-0 transition-opacity duration-300">
            <div class="bg-black/60 rounded-full p-6 text-white transform scale-150 transition-transform duration-300 flex items-center justify-center w-24 h-24">
                <svg id="play-pause-icon" class="w-12 h-12" fill="currentColor" viewBox="0 0 24 24"></svg>
            </div>
        </div>

        <div id="mode-indicator" class="absolute top-4 left-4 bg-gray-800/80 text-white px-3 py-1 rounded text-sm backdrop-blur-sm hidden font-mono">
            <span data-i18n="modeLabel">當前模式:</span> <span id="current-mode-text" class="text-blue-400 font-bold" data-i18n="modeA">選取 (A)</span>
        </div>
        <div id="speed-toast" class="absolute top-16 left-4 bg-black/80 text-white text-2xl font-bold px-4 py-2 rounded-lg backdrop-blur-md opacity-0 pointer-events-none transition-opacity duration-300 z-50">
            1.0x
        </div>

        <!-- 樂譜圖示按鈕 -->
        <button id="sheet-music-btn" class="absolute right-4 top-1/2 -translate-y-1/2 bg-gray-800/80 hover:bg-gray-700 text-white p-3 rounded-full shadow-lg backdrop-blur-sm transition-all z-40 hidden" title="樂譜編輯模式">
            <svg class="w-8 h-8 text-blue-400" fill="currentColor" viewBox="0 0 24 24">
                <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 13H9.5v-1.25c0-.62-.5-1.12-1.12-1.12H8.25V11.5h3.25V15zM13 9V3.5L18.5 9H13z"/>
            </svg>
        </button>

        <!-- 樂譜編輯視窗 -->
        <div id="sheet-music-modal" class="absolute inset-0 bg-gray-900 z-[100] hidden flex flex-col">
            <div class="bg-gray-800 p-3 flex justify-between items-center border-b border-gray-700 shadow-md">
                <h2 class="text-lg font-bold text-white flex items-center gap-2">
                    <svg class="w-5 h-5 text-blue-400" fill="currentColor" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2h12c1.1 0 2-.9 2-2V8l-6-6z"/></svg>
                    樂譜編輯模式
                </h2>
                <div class="flex gap-2">
                    <input type="file" id="pdf-upload" accept="application/pdf" class="hidden">
                    <button onclick="document.getElementById('pdf-upload').click()" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1 rounded text-sm">載入 PDF</button>
                    <button id="close-sheet-modal" class="bg-red-600 hover:bg-red-500 text-white px-3 py-1 rounded text-sm">關閉</button>
                </div>
            </div>
            <div class="flex-1 flex min-h-0">
                <!-- 左側：PDF 原文件 -->
                <div id="pdf-viewer-container" class="flex-1 bg-gray-600 overflow-auto relative flex flex-col items-center py-4 gap-4 scroll-smooth">
                    <!-- PDF 頁面會在這裡生成 -->
                    <div id="pdf-placeholder" class="text-gray-400 mt-20">請載入 PDF 文件</div>
                </div>
                <!-- 右側：定義區間按鈕列表 -->
                <div class="w-64 bg-gray-800 border-l border-gray-700 p-4 flex flex-col gap-2 overflow-y-auto" id="sheet-regions-list">
                    <div class="text-sm text-gray-400 mb-2 leading-relaxed">拖曳下方按鈕至左側 PDF 建立錨點。<br>點擊按鈕可跳轉至該錨點位置。</div>
                    <!-- 按鈕將由 JS 動態生成 -->
                </div>
            </div>
        </div>
    </main>

    <div id="resizer" class="h-2 bg-gray-700 hover:bg-blue-500 cursor-row-resize flex-none z-40 transition-colors" title="上下拖曳調整大小"></div>

    <footer id="editor-footer" class="bg-gray-800 border-t border-gray-700 flex flex-col select-none" style="height: 176px;">
        <div class="p-2 bg-gray-900/50 text-xs text-gray-400 flex justify-between items-center overflow-x-auto whitespace-nowrap">
            <div class="flex gap-4">
                <button type="button" onclick="setMode('A')" class="cursor-pointer hover:text-white transition-colors text-left"><strong class="text-white">A</strong>: <span data-i18n="helpA">選取模式</span></button>
                <button type="button" onclick="setMode('B')" class="cursor-pointer hover:text-white transition-colors text-left"><strong class="text-white">B</strong>: <span data-i18n="helpB">分割模式</span></button>
                <button type="button" onclick="clips.forEach(c => c.selected = (c.end <= video.currentTime + 0.1)); renderTimeline();" class="cursor-pointer hover:text-white transition-colors text-left"><strong class="text-white">[</strong>: <span data-i18n="helpL">左全選</span></button>
                <button type="button" onclick="clips.forEach(c => c.selected = (c.start >= video.currentTime - 0.1)); renderTimeline();" class="cursor-pointer hover:text-white transition-colors text-left"><strong class="text-white">]</strong>: <span data-i18n="helpR">右全選</span></button>
                <button type="button" onclick="if(clips.some(c => c.selected)){ clips = clips.filter(c => !c.selected); loopRegion = null; saveState(); renderTimeline(); }" class="cursor-pointer hover:text-white transition-colors text-left"><strong class="text-white">Del/Backspace</strong>: <span data-i18n="helpDel">刪除</span></button>
                <span><strong class="text-white" data-i18n="keyShift">Shift+點擊</strong>: <span data-i18n="helpShift">兩點框選</span></span>
                <span><strong class="text-white" data-i18n="keySpace">空白鍵</strong>: <span data-i18n="helpSpace">播放/暫停</span></span>
                <button type="button" onclick="activeRegionIndex = -1; loopRegion = null; clips.forEach(c => c.selected = false); renderRegions(); renderTimeline();" class="cursor-pointer hover:text-white transition-colors text-left"><strong class="text-white">M</strong>: <span>取消區域</span></button>
            </div>
            <div class="flex items-center gap-3 pr-4">
                <button id="define-region-btn" data-i18n="defineRegion" class="bg-gray-700 hover:bg-gray-600 text-gray-300 hover:text-white px-2 py-1 rounded text-xs border border-gray-600 transition">定義區間</button>
<button id="merge-clips-btn" class="bg-indigo-700 hover:bg-indigo-600 text-white px-2 py-1 rounded text-xs border border-indigo-500 ml-2 transition hidden">合併片段</button>
                <button id="zoom-fit-btn" class="hover:text-white transition" data-i18n-title="zoomFit" title="一鍵填滿 (適應螢幕)">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                </button>
                <button id="zoom-out-btn" class="hover:text-white transition" data-i18n-title="zoomOut" title="縮小">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM13 10H7"></path></svg>
                </button>
                <input type="range" id="zoom-slider" min="1" max="10" step="0.1" value="1" class="w-40 accent-blue-500">
                <button id="zoom-in-btn" class="hover:text-white transition" data-i18n-title="zoomIn" title="放大">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>
                </button>
            </div>
        </div>

        <div id="timeline-container" class="flex-1 relative mx-4 mt-2 mb-0 bg-gray-700 rounded-lg cursor-crosshair overflow-x-auto overflow-y-hidden group">
            <div id="timeline-content" class="relative h-full w-full origin-left transition-all duration-75">
                <div id="timeline-bg" class="absolute inset-0 z-0"></div>
                
                <div class="absolute top-4 bottom-1 left-0 right-0 border-t border-gray-600 border-dashed pointer-events-none opacity-50 z-0"></div>
                <div id="clips-track" class="absolute inset-0 z-10 pointer-events-none flex flex-col">
                    <div id="track-0" class="flex-1 relative pointer-events-none"></div>
                </div>

                <div id="loop-region" class="absolute inset-y-0 bg-green-500/30 border-x border-green-500 hidden z-20 pointer-events-none"></div>

                <div id="playhead" class="absolute top-0 bottom-0 w-0.5 bg-red-500 z-30 pointer-events-none">
                    <div class="absolute -top-1 -translate-x-1/2 w-3 h-3 bg-red-500 rotate-45"></div>
                </div>
                <div id="hover-line" class="absolute top-0 bottom-0 w-px bg-yellow-400 z-20 pointer-events-none hidden"></div>
            </div>
        </div>
    </footer>

    <script>
        const video = document.getElementById('video-player');
        const upload = document.getElementById('video-upload');
        const speedSlider = document.getElementById('speed-slider');
        const speedDisplay = document.getElementById('speed-display');
        const timelineContainer = document.getElementById('timeline-container');
        const timelineBg = document.getElementById('timeline-bg');
        const clipsTrack = document.getElementById('clips-track');
        const playhead = document.getElementById('playhead');
        const loopRegionEl = document.getElementById('loop-region');
        const modeIndicator = document.getElementById('mode-indicator');
        const currentModeText = document.getElementById('current-mode-text');
        const previewToggle = document.getElementById('preview-toggle');
        const undoBtn = document.getElementById('undo-btn');
        const redoBtn = document.getElementById('redo-btn');
        const hoverLine = document.getElementById('hover-line');
        const speedToast = document.getElementById('speed-toast');
        const playPauseOverlay = document.getElementById('play-pause-overlay');
        const playPauseIcon = document.getElementById('play-pause-icon');
        let playPauseTimer = null;

        // 影片點擊播放/暫停事件
        video.addEventListener('click', () => {
            if (!duration) return;
            
            if (video.paused) {
                lastSysTime = performance.now(); // 重置虛擬引擎計時器避免暴衝
                let targetSourceTime = savedPlayTime;
                for (let c of clips) {
                    if (savedPlayTime >= c.start && savedPlayTime < c.end) {
                        targetSourceTime = (c.sourceStart || 0) + (savedPlayTime - c.start);
                        break;
                    }
                }
                video.currentTime = targetSourceTime;
                video.play();
                // 顯示播放圖示 (三角形)
                playPauseIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
            } else {
                video.pause();
                // 顯示暫停圖示 (雙直線)
                playPauseIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            }
            
            // 觸發動畫
            playPauseOverlay.classList.remove('opacity-0');
            playPauseOverlay.firstElementChild.classList.remove('scale-150');
            playPauseOverlay.firstElementChild.classList.add('scale-100');
            
            clearTimeout(playPauseTimer);
            playPauseTimer = setTimeout(() => {
                playPauseOverlay.classList.add('opacity-0');
                playPauseOverlay.firstElementChild.classList.remove('scale-100');
                playPauseOverlay.firstElementChild.classList.add('scale-150');
            }, 500);
        });

        // 應用程式狀態
        let duration = 0;
        let clips = []; // { id, start, end, selected }
        let currentMode = 'A'; // 'A' (Select) or 'B' (Split)
        let loopRegion = null; // { start, end }
        let isDragging = false;
        let dragStartX = 0;
        let isHoverPreview = true; // 預覽開關
        let activeDragClip = null;  // 目前拖曳中的片段
        let dragOffset = 0;         // 拖曳點與片段開頭的距離
        let speedToastTimer = null; // 速度提示計時器
        let clickSelectStart = null;// 兩點選取起點

        let pdfAnchors = []; // 儲存樂譜錨點資訊

        // 歷史紀錄狀態 (Undo/Redo)
        let history = [];
        let historyIndex = -1;

        // 音訊波形狀態
        let waveformPeaks = [];

        // 獨立播放頭狀態
        let savedPlayTime = 0;
        let isHoveringTimeline = false;

        function saveState() {
            if (historyIndex < history.length - 1) {
                history = history.slice(0, historyIndex + 1);
            }
            history.push({
                clips: JSON.parse(JSON.stringify(clips)),
                regions: typeof customRegions !== 'undefined' ? JSON.parse(JSON.stringify(customRegions)) : []
            });
            historyIndex++;
        }

        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                const state = history[historyIndex];
                clips = JSON.parse(JSON.stringify(state.clips || state));
                if (typeof customRegions !== 'undefined' && state.regions) {
                    customRegions = JSON.parse(JSON.stringify(state.regions));
                    renderRegions();
                }
                renderTimeline();
            }
        }

        function redo() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                const state = history[historyIndex];
                clips = JSON.parse(JSON.stringify(state.clips || state));
                if (typeof customRegions !== 'undefined' && state.regions) {
                    customRegions = JSON.parse(JSON.stringify(state.regions));
                    renderRegions();
                }
                renderTimeline();
            }
        }

        if (undoBtn) undoBtn.addEventListener('click', undo);
        if (redoBtn) redoBtn.addEventListener('click', redo);

        // 預覽開關事件
        const eyeIcon = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>`;
        const eyeSlashIcon = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>`;

        if(previewToggle) {
            previewToggle.innerHTML = isHoverPreview ? eyeIcon : eyeSlashIcon;
            previewToggle.addEventListener('click', () => {
                isHoverPreview = !isHoverPreview;
                previewToggle.innerHTML = isHoverPreview ? eyeIcon : eyeSlashIcon;
                previewToggle.className = isHoverPreview 
                    ? 'p-2 rounded-lg bg-green-600 text-white transition-all' 
                    : 'p-2 rounded-lg bg-gray-600 text-gray-400 transition-all';
            });
        }

        // 解析音訊波形函數
        function extractAudioWaveform(file) {
            waveformPeaks = [];
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const reader = new FileReader();
            reader.onload = function(e) {
                audioCtx.decodeAudioData(e.target.result, function(buffer) {
                    const channelData = buffer.getChannelData(0);
                    // 將取樣數提高到 15000，確保極度放大時仍有高解析度細節
                    const samples = 15000;
                    const step = Math.ceil(channelData.length / samples);
                    for (let i = 0; i < samples; i++) {
                        let max = 0;
                        for (let j = 0; j < step; j++) {
                            if ((i * step) + j >= channelData.length) break;
                            const val = Math.abs(channelData[(i * step) + j]);
                            if (val > max) max = val;
                        }
                        waveformPeaks.push(max);
                    }
                    if (duration) renderTimeline(); // 重新渲染以顯示波形
                }).catch(err => console.warn("音訊解析失敗 (可能檔案過大或格式不支援):", err));
            };
            reader.readAsArrayBuffer(file);
        }

        let currentVideoName = '';
        let pendingImportData = null;

        // 載入影片
        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            currentVideoName = file.name;
            const url = URL.createObjectURL(file);
            video.src = url;
            video.load();
            extractAudioWaveform(file);
        });

        // 支援滑鼠拖曳載入多種檔案 (影片、JSON、PDF)
        document.body.addEventListener('dragover', (e) => {
            e.preventDefault(); // 必須阻止預設行為，否則瀏覽器會直接開啟影片離開網頁
        });

        document.body.addEventListener('drop', async (e) => {
            e.preventDefault();
            const files = Array.from(e.dataTransfer.files);
            if (files.length === 0) return;

            let videoFile = null;
            let jsonFile = null;
            let pdfFile = null;

            files.forEach(file => {
                if (file.type.startsWith('video/')) videoFile = file;
                else if (file.name.endsWith('.json') || file.type === 'application/json') jsonFile = file;
                else if (file.name.endsWith('.pdf') || file.type === 'application/pdf') pdfFile = file;
            });

            // 1. 處理 JSON (先讀取，確保 pendingImportData 準備好)
            if (jsonFile) {
                await new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const data = JSON.parse(event.target.result);
                        customRegions = data.customRegions || [];
                        pdfAnchors = data.pdfAnchors || [];
                        document.getElementById('sheet-music-btn').classList.remove('hidden');
                        renderRegions();
                        if (typeof window.updateSheetWindowUI === 'function') window.updateSheetWindowUI();
                        
                        if (data.videoName) {
                            currentVideoName = data.videoName;
                            pendingImportData = data;
                            // 若沒有一起拉入影片，才提醒選擇影片
                            if (!videoFile) {
                                setTimeout(() => {
                                    alert(`請選擇對應的影片檔 / Please select the corresponding video file:\n\n👉 ${data.videoName}`);
                                    document.getElementById('video-upload').click();
                                }, 50);
                            }
                        } else {
                            clips = data.clips;
                            saveState();
                            renderTimeline();
                        }
                        resolve();
                    };
                    reader.readAsText(jsonFile);
                });
            }

            // 2. 處理影片 (載入後自動觸發 loadedmetadata 讀取上面的 pendingImportData)
            if (videoFile) {
                currentVideoName = videoFile.name;
                const url = URL.createObjectURL(videoFile);
                video.src = url;
                video.load();
                extractAudioWaveform(videoFile);
            }

            // 3. 處理 PDF 樂譜 (開啟視窗並傳入資料)
            if (pdfFile) {
                const pdfReader = new FileReader();
                pdfReader.onload = function() {
                    const typedarray = new Uint8Array(this.result);
                    window.pendingPdfBuffer = typedarray; // 暫存於全域供子視窗抓取

                    // 觸發開啟樂譜視窗
                    document.getElementById('sheet-music-btn').click();

                    // 輪詢等待子視窗就緒後，直接自動載入 PDF
                    const checkInterval = setInterval(() => {
                        if (sheetWindow && !sheetWindow.closed && sheetWindow.loadPdfInWindowGlobally) {
                            clearInterval(checkInterval);
                            sheetWindow.loadPdfInWindowGlobally(window.pendingPdfBuffer);
                            window.pendingPdfBuffer = null;
                        }
                    }, 200);
                };
                pdfReader.readAsArrayBuffer(pdfFile);
            }
        });

        // 影片載入完成初始化資料
        video.addEventListener('loadedmetadata', () => {
            const initVideoData = () => {
                duration = video.duration;
                
                if (pendingImportData) {
                    clips = pendingImportData.clips;
                    loopRegion = null;
                    pendingImportData = null;
                } else {
                    // 真正的 NLE 架構：區分時間軸時間 (start/end) 與原始影片時間 (sourceStart)
                    clips = [{ id: Date.now(), start: 0, end: duration, sourceStart: 0, selected: false, track: 0 }];
                    loopRegion = null;
                }
                modeIndicator.classList.remove('hidden');
                document.getElementById('sheet-music-btn').classList.remove('hidden');
                
                history = [];
                historyIndex = -1;
                saveState(); // 儲存初始狀態
                
                setMode('A');
                renderTimeline();
                
                // 啟動虛擬播放引擎
                if (!animFrameId) animFrameId = requestAnimationFrame(virtualPlayEngine);
            };

            let animFrameId = null;
            let lastSysTime = performance.now();
            let currentActiveClip = null;

            // 虛擬播放引擎：負責讓時間軸與各個散落的片段對齊播放
            function virtualPlayEngine(sysTime) {
                const delta = (sysTime - lastSysTime) / 1000;
                lastSysTime = sysTime;

                if (!video.paused) {
                    // 增加虛擬時間 (savedPlayTime 充當全局時間軸)
                    savedPlayTime += delta * video.playbackRate;
                    if (savedPlayTime >= duration) {
                        savedPlayTime = duration;
                        video.pause(); // 到底強制暫停
                    }

                    // 尋找當前時間點所在的片段 (高軌道優先)
                    let activeClip = null;
                    for (let c of clips) {
                        if (savedPlayTime >= c.start && savedPlayTime < c.end) {
                            if (!activeClip || c.track > activeClip.track) activeClip = c;
                        }
                    }

                    if (activeClip) {
                        // 確保真實影片時間點與片段內部時間同步
                        const targetSourceTime = (activeClip.sourceStart || 0) + (savedPlayTime - activeClip.start);
                        if (Math.abs(video.currentTime - targetSourceTime) > 0.3) {
                            video.currentTime = targetSourceTime;
                        }
                        video.style.opacity = '1';
                        video.muted = false;
                        currentActiveClip = activeClip;
                    } else {
                        // 播放到空白區段，黑屏靜音
                        video.style.opacity = '0';
                        video.muted = true;
                        currentActiveClip = null;
                    }
                    
                    // 循環播放處理
                    if (loopRegion && loopRegion.start !== loopRegion.end) {
                        if (savedPlayTime >= loopRegion.end) savedPlayTime = loopRegion.start;
                    }
                }

                // 更新 UI 播放頭 (無論是否播放皆強制同步)
                const maxTime = Math.max(duration, ...clips.map(c => c.end));
                const percent = (savedPlayTime / maxTime) * 100;
                playhead.style.left = `${percent}%`;

                animFrameId = requestAnimationFrame(virtualPlayEngine);
            }

            // 修正 Chrome 瀏覽器載入本地影片時 duration 為 Infinity 導致進度條消失的 Bug
            if (video.duration === Infinity || isNaN(video.duration)) {
                video.currentTime = 1e101; // 強制跳到影片最後以取得正確長度
                const fixDuration = () => {
                    video.removeEventListener('timeupdate', fixDuration);
                    video.currentTime = 0;
                    initVideoData();
                };
                video.addEventListener('timeupdate', fixDuration);
            } else {
                initVideoData();
            }
        });

        // 移除原生 timeupdate 的時間軸強制連動，完全由虛擬播放引擎 (virtualPlayEngine) 接管
        video.addEventListener('timeupdate', () => {
            if (!duration) return;
        });

        // 播放速度調整
        speedSlider.addEventListener('input', (e) => {
            const speed = parseFloat(e.target.value);
            video.playbackRate = speed;
            speedDisplay.textContent = speed.toFixed(1) + 'x';
        });

        // --- 時間軸互動與渲染 ---
        
        function renderTimeline() {
            if (!duration) return;
            const maxTime = Math.max(duration, ...clips.map(c => c.end));
            
            // 重建軌道 DOM
            clipsTrack.innerHTML = `
                <div id="track-0" class="flex-1 relative pointer-events-none"></div>
            `;
            const track0 = document.getElementById('track-0');
            const track1 = null;
            
            clips.forEach(clip => {
                const clipEl = document.createElement('div');
                const leftPercent = (clip.start / maxTime) * 100;
                const widthPercent = ((clip.end - clip.start) / maxTime) * 100;
                
                const colorClass = clip.track === 1 ? 'bg-indigo-600/80 border-indigo-800' : 'bg-blue-600/80 border-blue-800';
                clipEl.className = `clip-segment absolute top-0 bottom-0 ${colorClass} rounded border-y border-x-2 border-x-gray-900 pointer-events-auto cursor-pointer ${clip.selected ? 'selected' : ''}`;
                
                clipEl.style.left = `calc(${leftPercent}% + 1px)`;
                clipEl.style.width = `calc(${widthPercent}% - 2px)`;
                
                clipEl.addEventListener('mousedown', (e) => {
                    e.stopPropagation();
                    // 點擊片段時取消自定義區塊的高亮狀態
                    activeRegionIndex = -1;
                    renderRegions();

                    // 手動偵測雙擊，解決 renderTimeline 重構 DOM 導致原生 dblclick 失效的問題
                    const now = Date.now();
                    const isDoubleClick = (now - (clip.lastClick || 0)) < 300;
                    clip.lastClick = now;

                    const contentEl = document.getElementById('timeline-content');
                    const rect = contentEl.getBoundingClientRect();
                    const clickTime = ((e.clientX - rect.left) / rect.width) * maxTime;
                    
                    savedPlayTime = clickTime;
                    const targetSourceTime = (clip.sourceStart || 0) + (clickTime - clip.start);
                    video.currentTime = targetSourceTime;

                    // 處理雙擊框選、Shift 兩點框選或重設。現在支援在藍色片段上進行 Shift+點擊 框選
                    if (isDoubleClick) {
                        loopRegion = { start: clip.start, end: clip.end };
                        clickSelectStart = null; 
                        
                        // 使用 setTimeout 讓畫面先渲染出綠色選取框，再跳出輸入視窗
                        setTimeout(() => {
                            const name = prompt(i18nData[currentLang].promptRegion, i18nData[currentLang].promptRegionDefault + (customRegions.length + 1));
                            if (name) {
                                customRegions.push({ name, start: loopRegion.start, end: loopRegion.end });
                                saveState();
                                renderRegions();
                                renderTimeline();
                            }
                        }, 50);
                    } else if (e.shiftKey && clickSelectStart !== null) {
                        loopRegion = {
                            start: Math.min(clickSelectStart, clickTime),
                            end: Math.max(clickSelectStart, clickTime)
                        };
                        clickSelectStart = null;
                    } else {
                        loopRegion = null;
                        clickSelectStart = clickTime;
                    }

                    if (currentMode === 'A') {
                        if (!e.shiftKey) clips.forEach(c => c.selected = false);
                        clip.selected = true;
                        activeDragClip = clip;
                        dragOffset = clickTime - clip.start;
                        renderTimeline();
                    } else if (currentMode === 'B') {
                        splitClip(clip, clickTime);
                    }
                });
                
                // 繪製音訊波形
                if (waveformPeaks.length > 0 && duration > 0) {
                    const canvas = document.createElement('canvas');
                    // 改善：將 bottom-8 改為 bottom-1 並拉高比例，確保波形貼齊底部不被空白處遮擋
                    canvas.className = "absolute inset-x-0 bottom-1 w-full h-3/4 pointer-events-none";
                    const clipRatio = (clip.end - clip.start) / duration;
                    
                    const containerWidth = document.getElementById('timeline-container').clientWidth;
                    const currentZoom = parseFloat(document.getElementById('zoom-slider').value) || 1;
                    const expectedPixelWidth = containerWidth * currentZoom * clipRatio;
                    canvas.width = Math.min(16000, Math.max(100, Math.floor(expectedPixelWidth)));
                    canvas.height = 80;
                    const ctx = canvas.getContext('2d');
                    
                    const startIdx = Math.floor((clip.sourceStart / duration) * waveformPeaks.length);
                    const endIdx = Math.floor(((clip.sourceStart + (clip.end - clip.start)) / duration) * waveformPeaks.length);
                    const clipPeaks = waveformPeaks.slice(startIdx, endIdx);
                    
                    if (clipPeaks.length > 0) {
                        const barWidth = canvas.width / clipPeaks.length;
                        clipPeaks.forEach((peak, i) => {
                            const displayPeak = Math.min(peak * 1.5, 1.0);
                            const h = displayPeak * canvas.height;
                            if (displayPeak > 0.7) {
                                const gradient = ctx.createLinearGradient(0, canvas.height - h, 0, canvas.height);
                                gradient.addColorStop(0, '#FF3B30');
                                gradient.addColorStop(0.2, '#FF9500');
                                gradient.addColorStop(0.5, '#38BDF8');
                                ctx.fillStyle = gradient;
                            } else {
                                ctx.fillStyle = '#38BDF8';
                            }
                            ctx.fillRect(i * barWidth, canvas.height - h, Math.max(1, barWidth - 0.5), h);
                        });
                    }
                    clipEl.appendChild(canvas);
                }

                // 2) 在藍色影片區塊上方，用半透明的文字顯示用戶標示的名稱
                const matchedRegion = customRegions.find(r => Math.abs(r.start - clip.start) < 0.1 && Math.abs(r.end - clip.end) < 0.1);
                if (matchedRegion) {
                    const label = document.createElement('div');
                    label.className = "absolute top-1 left-2 text-white/40 font-bold text-[10px] pointer-events-none select-none truncate pr-2";
                    label.textContent = matchedRegion.name;
                    clipEl.appendChild(label);
                }

                if (track0) {
                    track0.appendChild(clipEl);
                }
            });

            if (loopRegion) {
                loopRegionEl.classList.remove('hidden');
                const startP = (loopRegion.start / maxTime) * 100;
                const widthP = ((loopRegion.end - loopRegion.start) / maxTime) * 100;
                loopRegionEl.style.left = `${startP}%`;
                loopRegionEl.style.width = `${widthP}%`;
            } else {
                loopRegionEl.classList.add('hidden');
            }

            // 2) 當多個片段被選取時，顯示合併按鈕
            const mergeBtn = document.getElementById('merge-clips-btn');
            if (mergeBtn) {
                const selectedCount = clips.filter(c => c.selected).length;
                if (selectedCount > 1) {
                    mergeBtn.classList.remove('hidden');
                } else {
                    mergeBtn.classList.add('hidden');
                }
            }
        }

        function splitClip(clip, time) {
            // 確保分割點在片段內部
            if (time <= clip.start + 0.1 || time >= clip.end - 0.1) return; 
            const idx = clips.indexOf(clip);
            if (idx === -1) return;

            // 繼承軌道屬性與計算原始影片對應時間 (True NLE)
            const tIdx = clip.track || 0;
            const sStart = clip.sourceStart || 0;
            const splitOffset = time - clip.start;
            
            const clip1 = { id: Date.now(), start: clip.start, end: time, sourceStart: sStart, selected: clip.selected, track: tIdx };
            const clip2 = { id: Date.now()+1, start: time, end: clip.end, sourceStart: sStart + splitOffset, selected: false, track: tIdx };
            
            clips.splice(idx, 1, clip1, clip2);
            saveState(); // 紀錄分割
            renderTimeline();
            
            // 成功分割後自動跳回 A 模式
            setMode('A');
        }

        // 點擊背景：B模式背景切割 或 A模式兩點框選
        timelineBg.addEventListener('mousedown', (e) => {
            if (!duration) return;
            // 點擊背景時取消自定義區塊的高亮狀態
            activeRegionIndex = -1;
            renderRegions();
            
            const contentEl = document.getElementById('timeline-content');
            const rect = contentEl.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const maxTime = Math.max(duration, ...clips.map(c => c.end));
            const time = (clickX / rect.width) * maxTime;

            // 點擊任一地方皆更新紅色進度線 (包含 B 模式)
            savedPlayTime = time;
            let targetSourceTime = time;
            video.style.opacity = '0';
            video.muted = true;
            for (let c of clips) {
                if (time >= c.start && time < c.end) {
                    targetSourceTime = (c.sourceStart || 0) + (time - c.start);
                    video.style.opacity = '1';
                    video.muted = false;
                    break;
                }
            }
            video.currentTime = targetSourceTime;

            if (currentMode === 'B') {
                // 在背景按 B 也能切割：找出該時間點覆蓋的片段
                let splitted = false;
                const targets = clips.filter(c => time > c.start + 0.1 && time < c.end - 0.1);
                targets.forEach(c => {
                    splitClip(c, time);
                    splitted = true;
                });
                return;
            }

            // A 模式：兩點選取 (按住 Shift 點擊第二點才框選)
            if (currentMode === 'A') {
                if (e.shiftKey && clickSelectStart !== null) {
                    loopRegion = {
                        start: Math.min(clickSelectStart, time),
                        end: Math.max(clickSelectStart, time)
                    };
                    // 1) 在灰色區域 Shift+點擊時，同時選取該範圍內的所有片段
                    clips.forEach(c => {
                        if (c.start < loopRegion.end && c.end > loopRegion.start) {
                            c.selected = true;
                        }
                    });
                    clickSelectStart = null;
                } else {
                    clickSelectStart = time;
                    loopRegion = null;
                }
                renderTimeline();
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (!duration) return;
            const containerRect = timelineContainer.getBoundingClientRect();
            const contentEl = document.getElementById('timeline-content');
            const contentRect = contentEl.getBoundingClientRect();
            
            const inTimeline = e.clientY >= containerRect.top && e.clientY <= containerRect.bottom && e.clientX >= containerRect.left && e.clientX <= containerRect.right;
            
            // 處理獨立游標預覽線與滑動預覽
            if (inTimeline) {
                let hoverX = e.clientX - contentRect.left;
                hoverX = Math.max(0, Math.min(hoverX, contentRect.width));
                const hoverTime = (hoverX / contentRect.width) * duration;
                
                if (isHoverPreview && !isDragging && !activeDragClip && video.paused) {
                    isHoveringTimeline = true;
                    let targetSourceTime = hoverTime;
                    video.style.opacity = '0';
                    for (let c of clips) {
                        if (hoverTime >= c.start && hoverTime < c.end) {
                            targetSourceTime = (c.sourceStart || 0) + (hoverTime - c.start);
                            video.style.opacity = '1';
                            break;
                        }
                    }
                    video.currentTime = targetSourceTime;
                }
                hoverLine.style.left = `${(hoverX / contentRect.width) * 100}%`;
                hoverLine.classList.remove('hidden');
            } else {
                if (isHoveringTimeline && video.paused) {
                    video.currentTime = savedPlayTime; // 滑鼠離開時間軸時恢復畫面
                }
                isHoveringTimeline = false;
                hoverLine.classList.add('hidden');
            }

            let currentX = e.clientX - contentRect.left;
            currentX = Math.max(0, Math.min(currentX, contentRect.width)); // 限制在容器內
            const currentTimePos = (currentX / contentRect.width) * duration;

            // 處理片段拖曳 (拉開與切換軌道，防重疊)
            if (activeDragClip && currentMode === 'A') {
                const clipLen = activeDragClip.end - activeDragClip.start;
                let newStart = currentTimePos - dragOffset;
                
                // 鎖定單一軌道
                const newTrack = 0;

                if (newStart < 0) newStart = 0; 
                let newEnd = newStart + clipLen;

                // 防重疊偵測 (Anti-collision): 尋找目標軌道上的其他片段
                let canMove = true;
                for (let other of clips) {
                    if (other.id !== activeDragClip.id && other.track === newTrack) {
                        if (newStart < other.end && newEnd > other.start) {
                            // 發生碰撞，將片段卡在相鄰片段的邊緣
                            if (activeDragClip.start >= other.end) {
                                newStart = other.end;
                                newEnd = newStart + clipLen;
                            } else if (activeDragClip.end <= other.start) {
                                newEnd = other.start;
                                newStart = newEnd - clipLen;
                            } else {
                                canMove = false; 
                            }
                        }
                    }
                }

                if (canMove) {
                    activeDragClip.start = newStart;
                    activeDragClip.end = newEnd;
                    activeDragClip.track = newTrack;
                }

                renderTimeline();
                return;
            }

            // 處理背景拖曳 (循環區間)
            if (isDragging) {
                const time1 = (dragStartX / contentRect.width) * duration;
                const time2 = currentTimePos;
                
                if (Math.abs(currentX - dragStartX) > 5) {
                    loopRegion = { start: Math.min(time1, time2), end: Math.max(time1, time2) };
                } else {
                    video.currentTime = time2;
                    loopRegion = null;
                }
                renderTimeline();
            }
        });

        document.addEventListener('mouseup', () => {
            if (activeDragClip) {
                activeDragClip = null;
                saveState(); // 紀錄拖曳結果
            }
            if (isDragging) {
                isDragging = false;
                if (loopRegion && (loopRegion.end - loopRegion.start < 0.2)) loopRegion = null;
                renderTimeline();
            }
        });

        // --- 快捷鍵設定 ---
        function setMode(mode) {
            currentMode = mode;
            if (mode === 'A') {
                currentModeText.textContent = i18nData[currentLang].modeA;
                currentModeText.className = 'text-blue-400 font-bold';
                timelineContainer.classList.remove('cursor-col-resize');
                timelineContainer.classList.add('cursor-crosshair');
            } else {
                currentModeText.textContent = i18nData[currentLang].modeB;
                currentModeText.className = 'text-red-400 font-bold';
                timelineContainer.classList.remove('cursor-crosshair');
                timelineContainer.classList.add('cursor-col-resize'); // 改用類似刀片的游標提示
            }
        }

        function updateSpeed(speed) {
            speed = Math.max(0.1, Math.min(speed, 4));
            video.playbackRate = speed;
            speedSlider.value = speed;
            speedDisplay.textContent = speed.toFixed(1) + 'x';
            
            // 同步更新速度按鈕的 UI 選取狀態
            const formattedSpeed = speed.toFixed(1);
            document.querySelectorAll('.speed-btn').forEach(btn => {
                if (btn.dataset.speed === formattedSpeed) {
                    btn.className = "speed-btn px-3 py-1.5 mx-0.5 rounded-lg text-sm font-bold transition-all border bg-blue-600 border-blue-400 text-white";
                } else {
                    btn.className = "speed-btn px-3 py-1.5 mx-0.5 rounded-lg text-sm font-bold transition-all border border-gray-600 bg-gray-700 text-gray-300 hover:bg-blue-500 hover:text-white";
                }
            });

            // 顯示畫面的提示 2 秒
            if (speedToast) {
                speedToast.textContent = speed.toFixed(1) + 'x';
                speedToast.classList.remove('opacity-0');
                clearTimeout(speedToastTimer);
                speedToastTimer = setTimeout(() => {
                    speedToast.classList.add('opacity-0');
                }, 2000);
            }
        }

        document.addEventListener('keydown', (e) => {
            // 避免焦點在 input 時觸發快捷鍵
            if (e.target.tagName.toLowerCase() === 'input') return;

            // 處理自定義區塊的左右切換與順序對調
            if (activeRegionIndex !== -1 && customRegions.length > 0) {
                if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    if (e.metaKey || e.ctrlKey) {
                        if (activeRegionIndex > 0) {
                            const temp = customRegions[activeRegionIndex];
                            customRegions[activeRegionIndex] = customRegions[activeRegionIndex - 1];
                            customRegions[activeRegionIndex - 1] = temp;
                            activeRegionIndex--;
                            saveState();
                            renderRegions();
                            renderTimeline();
                        }
                    } else {
                        if (activeRegionIndex > 0) {
                            activeRegionIndex--;
                            const reg = customRegions[activeRegionIndex];
                            savedPlayTime = reg.start; 
                            video.currentTime = reg.start;
                            loopRegion = { start: reg.start, end: reg.end };
                            renderTimeline();
                            renderRegions();
                        }
                    }
                    return;
                } else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    if (e.metaKey || e.ctrlKey) {
                        if (activeRegionIndex < customRegions.length - 1) {
                            const temp = customRegions[activeRegionIndex];
                            customRegions[activeRegionIndex] = customRegions[activeRegionIndex + 1];
                            customRegions[activeRegionIndex + 1] = temp;
                            activeRegionIndex++;
                            saveState();
                            renderRegions();
                            renderTimeline();
                        }
                    } else {
                        if (activeRegionIndex < customRegions.length - 1) {
                            activeRegionIndex++;
                            const reg = customRegions[activeRegionIndex];
                            savedPlayTime = reg.start; 
                            video.currentTime = reg.start;
                            loopRegion = { start: reg.start, end: reg.end };
                            renderTimeline();
                            renderRegions();
                        }
                    }
                    return;
                }
            }

            // Undo / Redo 快捷鍵 (Cmd/Ctrl + Z / Y)
            if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'z') {
                e.preventDefault();
                undo();
                return;
            }
            if ((e.metaKey || e.ctrlKey) && (e.key.toLowerCase() === 'y' || (e.shiftKey && e.key.toLowerCase() === 'z'))) {
                e.preventDefault();
                redo();
                return;
            }

            // 存檔與載入快捷鍵 (Cmd/Ctrl + S / L)
            if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 's') {
                e.preventDefault();
                document.getElementById('export-btn').click();
                return;
            }
            if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'l') {
                e.preventDefault();
                document.getElementById('import-btn').click();
                return;
            }

            const t = video.currentTime;

            switch(e.key.toLowerCase()) {
                case '5': updateSpeed(0.5); break;
                case '8': updateSpeed(0.8); break;
                case '1': updateSpeed(1.0); break;
                case '2': updateSpeed(2.0); break;
                case '3': updateSpeed(3.0); break;
                case '4': updateSpeed(4.0); break;
                case '+': case '=': updateSpeed(video.playbackRate + 0.1); break;
                case '-': case '_': updateSpeed(video.playbackRate - 0.1); break;
                case 'a':
                    setMode('A');
                    break;
                case 'b':
                    setMode('B');
                    break;
                case 'm':
                    activeRegionIndex = -1;
                    loopRegion = null;
                    clips.forEach(c => c.selected = false);
                    renderRegions();
                    renderTimeline();
                    break;
                case 'r':
                    if (defineRegionBtn) defineRegionBtn.click();
                    break;
                case '`':
                    const selectedClip = clips.find(c => c.selected);
                    if (selectedClip) {
                        loopRegion = { start: selectedClip.start, end: selectedClip.end };
                        renderTimeline();
                        setTimeout(() => {
                            if (defineRegionBtn) defineRegionBtn.click();
                        }, 50);
                    }
                    break;
                case '[':
                    clips.forEach(c => c.selected = (c.end <= t + 0.1));
                    renderTimeline();
                    break;
                case ']':
                    clips.forEach(c => c.selected = (c.start >= t - 0.1));
                    renderTimeline();
                    break;
                case 'backspace':
                case 'delete':
                    const originalLength = clips.length;
                    clips = clips.filter(c => !c.selected);
                    if (clips.length !== originalLength) {
                        loopRegion = null;
                        saveState(); // 紀錄刪除
                        renderTimeline();
                    }
                    break;
                case 'enter': // 2) 按下 enter 鍵代表一鍵填滿
                    e.preventDefault();
                    if (updateZoom) updateZoom(1);
                    break;
                case ' ': // 空白鍵
                    e.preventDefault();
                    if (video.paused) {
                        lastSysTime = performance.now(); // 重置虛擬引擎計時器避免暴衝
                        
                        // 確保播放前畫面跳回獨立播放頭正確的影片時間點
                        let targetSourceTime = savedPlayTime;
                        for (let c of clips) {
                            if (savedPlayTime >= c.start && savedPlayTime < c.end) {
                                targetSourceTime = (c.sourceStart || 0) + (savedPlayTime - c.start);
                                break;
                            }
                        }
                        video.currentTime = targetSourceTime;
                        video.play();
                        // 顯示播放圖示 (三角形)
                        playPauseIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
                    } else {
                        video.pause();
                        // 顯示暫停圖示 (雙直線)
                        playPauseIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
                    }
                    
                    // 觸發動畫
                    playPauseOverlay.classList.remove('opacity-0');
                    playPauseOverlay.firstElementChild.classList.remove('scale-150');
                    playPauseOverlay.firstElementChild.classList.add('scale-100');
                    
                    clearTimeout(playPauseTimer);
                    playPauseTimer = setTimeout(() => {
                        playPauseOverlay.classList.add('opacity-0');
                        playPauseOverlay.firstElementChild.classList.remove('scale-100');
                        playPauseOverlay.firstElementChild.classList.add('scale-150');
                    }, 500);
                    break;
            }
        });

        // --- 縮放編輯區功能 ---
        const zoomSliderUI = document.getElementById('zoom-slider');
        const zoomInBtn = document.getElementById('zoom-in-btn');
        const zoomOutBtn = document.getElementById('zoom-out-btn');
        const zoomFitBtn = document.getElementById('zoom-fit-btn');
        
        let updateZoom; 

        if (zoomSliderUI) {
            updateZoom = (val) => {
                const contentEl = document.getElementById('timeline-content');
                if (!contentEl) return;
                let zoom = parseFloat(val);
                zoom = Math.max(1, Math.min(zoom, 10)); // 縮放比例 1x 到 10x
                zoomSliderUI.value = zoom;
                contentEl.style.width = `${zoom * 100}%`;
                
                // 確保重新渲染軌道 UI
                if (duration) renderTimeline();
            };

            zoomSliderUI.addEventListener('input', (e) => updateZoom(e.target.value));
            zoomInBtn.addEventListener('click', () => updateZoom(parseFloat(zoomSliderUI.value) + 0.5));
            zoomOutBtn.addEventListener('click', () => updateZoom(parseFloat(zoomSliderUI.value) - 0.5));
            zoomFitBtn.addEventListener('click', () => updateZoom(1));

            // 1) 當滑鼠移至灰色區域時，按住 command/ctrl + 滾輪縮放
            timelineContainer.addEventListener('wheel', (e) => {
                if (e.metaKey || e.ctrlKey) {
                    e.preventDefault();
                    const delta = e.deltaY > 0 ? -0.5 : 0.5;
                    updateZoom(parseFloat(zoomSliderUI.value) + delta);
                }
            }, { passive: false });
        }

        // --- 區域命名與匯出功能 ---
        let customRegions = [];
        let activeRegionIndex = -1;

        // 在 footer 加入一個容器供按鈕放置
        const footer = document.querySelector('footer');
        const regionContainer = document.createElement('div');
        regionContainer.id = "custom-regions-container";
        regionContainer.className = "flex gap-2 p-2 px-4 flex-wrap mt-auto";
        footer.appendChild(regionContainer);

        function renderRegions() {
            regionContainer.innerHTML = '';
            customRegions.forEach((reg, index) => {
                const isActive = activeRegionIndex === index;
                const btn = document.createElement('div');
                
                // 啟用拖曳功能
                btn.draggable = true;
                btn.ondragstart = (e) => {
                    e.dataTransfer.setData('text/plain', index);
                    btn.style.opacity = '0.5';
                };
                btn.ondragover = (e) => {
                    e.preventDefault();
                    // 顯示黃色輔助線作為插入點提示
                    btn.classList.add('border-l-yellow-400');
                    btn.classList.remove('border-transparent');
                };
                btn.ondragleave = () => {
                    btn.classList.add('border-transparent');
                    btn.classList.remove('border-l-yellow-400');
                };
                btn.ondragend = () => renderRegions();
                btn.ondrop = (e) => {
                    e.preventDefault();
                    btn.classList.add('border-transparent');
                    btn.classList.remove('border-l-yellow-400');
                    const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
                    if (fromIdx !== index) {
                        const [moved] = customRegions.splice(fromIdx, 1);
                        customRegions.splice(index, 0, moved);
                        // 同步更新高亮索引
                        if (activeRegionIndex === fromIdx) {
                            activeRegionIndex = index;
                        } else if (activeRegionIndex > fromIdx && activeRegionIndex <= index) {
                            activeRegionIndex--;
                        } else if (activeRegionIndex < fromIdx && activeRegionIndex >= index) {
                            activeRegionIndex++;
                        }
                        renderRegions();
                        renderTimeline();
                    }
                };

                // 檢查此區間是否被完全包含在另一個更大的區間中
                const isContained = customRegions.some((other, i) => index !== i && reg.start >= other.start && reg.end <= other.end && (other.end - other.start) > (reg.end - reg.start));
                
                const bgClass = isContained 
                    ? (isActive ? 'bg-yellow-400 ring-2 ring-white shadow-lg scale-105 text-gray-900' : 'bg-yellow-600 hover:bg-yellow-500 opacity-80 text-white')
                    : (isActive ? 'bg-purple-400 ring-2 ring-white shadow-lg scale-105' : 'bg-purple-600 hover:bg-purple-500 opacity-80');
                    
                const closeClass = isContained 
                    ? (isActive ? 'text-gray-600 hover:text-gray-900' : 'text-yellow-200 hover:text-white')
                    : 'text-purple-200 hover:text-white';

                // 預設加入透明左邊框 (border-l-4 border-transparent) 以防佈局跳動
                btn.className = `px-3 py-1 rounded-full text-xs flex items-center gap-2 cursor-move transition-all border-l-4 border-transparent ${bgClass}`;
                btn.innerHTML = `${reg.name} <span class="${closeClass} font-bold ml-1 cursor-pointer" onclick="event.stopPropagation(); customRegions.splice(${index},1); if(activeRegionIndex===${index})activeRegionIndex=-1; saveState(); renderRegions(); renderTimeline();">×</span>`;
                btn.onclick = () => { 
                    activeRegionIndex = index;
                    savedPlayTime = reg.start; 
                    video.currentTime = reg.start;
                    loopRegion = { start: reg.start, end: reg.end };
                    renderTimeline();
                    renderRegions();
                    
                    // === 新增：確保按下區間後自動播放 ===
                    if (video.paused) {
                        video.play();
                    }
                    
                    // 自動平滑捲動到該區間的位置，減去 50px 是為了讓左側保留一點視覺空間避免貼齊邊緣
                    const maxTime = Math.max(duration, ...clips.map(c => c.end));
                    const contentWidth = document.getElementById('timeline-content').scrollWidth;
                    timelineContainer.scrollTo({ left: (reg.start / maxTime) * contentWidth - 50, behavior: 'smooth' });
                };
                regionContainer.appendChild(btn);
            });
            if (typeof renderSheetRegions === 'function') {
                renderSheetRegions();
            }
        }

        // 綁定右鍵事件到 loopRegion
        loopRegionEl.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            if (!loopRegion) return;
            const name = prompt(i18nData[currentLang].promptRegion, i18nData[currentLang].promptRegionDefault);
            if (name) {
                customRegions.push({ name, start: loopRegion.start, end: loopRegion.end });
                saveState();
                renderRegions();
            }
        });

        // 綁定「定義區間」按鈕
        const defineRegionBtn = document.getElementById('define-region-btn');
        if (defineRegionBtn) {
            defineRegionBtn.addEventListener('click', () => {
                if (!loopRegion) {
                    alert(i18nData[currentLang].alertSelect);
                    return;
                }
                const name = prompt(i18nData[currentLang].promptRegion, i18nData[currentLang].promptRegionDefault + (customRegions.length + 1));
                if (name) {
                    customRegions.push({ name, start: loopRegion.start, end: loopRegion.end });
                    saveState();
                    renderRegions();
                    renderTimeline();
                }
            });
        }

        // 2) 拼接片段邏輯：合併為單一完整物件，徹底消除視覺縫隙，時長為片段完美相加
        const mergeClipsBtn = document.getElementById('merge-clips-btn');
        if (mergeClipsBtn) {
            mergeClipsBtn.onclick = () => {
                const selected = clips.filter(c => c.selected).sort((a, b) => a.start - b.start);
                if (selected.length < 2) return;

                const newStart = selected[0].start;
                // 精準加總所有片段的實際時長，確保總長度絕對不縮短也不增加
                const totalDuration = selected.reduce((sum, clip) => sum + (clip.end - clip.start), 0);
                const newEnd = newStart + totalDuration;
                const newSourceStart = selected[0].sourceStart;

                // 自動清理對應的自定義區塊 (恢復原本正確的清理邏輯)
                customRegions = customRegions.filter(reg => 
                    !selected.some(c => Math.abs(reg.start - c.start) < 0.1 && Math.abs(reg.end - c.end) < 0.1)
                );

                // 刪除原本的碎片段，直接合併成一個全新的完整物件，徹底消除中間的縫隙
                clips = clips.filter(c => !c.selected);
                clips.push({ id: Date.now(), start: newStart, end: newEnd, sourceStart: newSourceStart, selected: true, track: selected[0].track || 0 });
                clips.sort((a, b) => a.start - b.start);
                
                loopRegion = null;
                saveState();
                renderTimeline();
                renderRegions();
            };
        }

        let currentFileHandle = null;
        let currentJsonName = 'project.json';

        // 匯出功能 (支援覆蓋原檔)
        document.getElementById('export-btn').addEventListener('click', async () => {
            const data = JSON.stringify({ videoName: currentVideoName, clips, customRegions, pdfAnchors });
            
            // 檢查瀏覽器是否支援 File System Access API
            if ('showSaveFilePicker' in window) {
                try {
                    // 若尚未取得檔案權限，則跳出選擇視窗 (自動帶入原檔名)
                    if (!currentFileHandle) {
                        currentFileHandle = await window.showSaveFilePicker({
                            suggestedName: currentJsonName,
                            types: [{ description: 'JSON File', accept: { 'application/json': ['.json'] } }]
                        });
                        currentJsonName = currentFileHandle.name; // 紀錄使用者最終決定的檔名
                    }
                    const writable = await currentFileHandle.createWritable();
                    await writable.write(data);
                    await writable.close();
                    
                    // 顯示畫面輕量提示
                    if (speedToast) {
                        speedToast.textContent = '存檔成功';
                        speedToast.classList.remove('opacity-0');
                        clearTimeout(speedToastTimer);
                        speedToastTimer = setTimeout(() => { speedToast.classList.add('opacity-0'); }, 2000);
                    }
                } catch (err) {
                    if (err.name !== 'AbortError') fallbackDownload(data); 
                }
            } else {
                fallbackDownload(data); 
            }
        });

        function fallbackDownload(data) {
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = currentJsonName; // 確保傳統下載模式也能帶入原檔名
            a.click();
        }

        // 攔截原本按鈕的點擊事件，改用現代 API 取得檔案讀寫權限
        const importBtn = document.getElementById('import-btn');
        if (importBtn) {
            importBtn.removeAttribute('onclick'); 
            importBtn.addEventListener('click', async (e) => {
                e.preventDefault();
                if ('showOpenFilePicker' in window) {
                    try {
                        const handles = await window.showOpenFilePicker({
                            multiple: true,
                            types: [
                                {
                                    description: '所有支援的檔案 (JSON, 影片, PDF)',
                                    accept: {
                                        '*/*': ['.json', '.mp4', '.mov', '.avi', '.webm', '.mkv', '.pdf']
                                    }
                                }
                            ]
                        });
                        
                        let files = [];
                        for (const handle of handles) {
                            const file = await handle.getFile();
                            files.push(file);
                            // 儲存 JSON 的 handle 以供後續快速 (Cmd+S) 覆蓋存檔
                            if (file.name.endsWith('.json')) {
                                currentFileHandle = handle;
                                currentJsonName = file.name;
                            }
                        }
                        processMultipleFiles(files);
                    } catch (err) {
                        if (err.name !== 'AbortError') console.error(err);
                    }
                } else {
                    document.getElementById('import-input').click(); 
                }
            });
        }

        // 匯入功能 (供舊版瀏覽器或回退方案使用)
        document.getElementById('import-input').addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            if (files.length > 0) {
                const jsonFile = files.find(f => f.name.endsWith('.json'));
                if (jsonFile) {
                    currentFileHandle = null; 
                    currentJsonName = jsonFile.name;
                }
                processMultipleFiles(files);
            }
            e.target.value = ''; // 清除 value 允許重複選擇相同檔案
        });

        async function processMultipleFiles(files) {
            let videoFile = null;
            let jsonFile = null;
            let pdfFile = null;

            files.forEach(file => {
                if (file.type.startsWith('video/') || file.name.match(/\.(mp4|mov|webm|avi|mkv)$/i)) videoFile = file;
                else if (file.name.endsWith('.json') || file.type === 'application/json') jsonFile = file;
                else if (file.name.endsWith('.pdf') || file.type === 'application/pdf') pdfFile = file;
            });

            // 1. 處理 JSON (先讀取，確保 pendingImportData 準備好)
            if (jsonFile) {
                await new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const data = JSON.parse(event.target.result);
                        customRegions = data.customRegions || [];
                        pdfAnchors = data.pdfAnchors || [];
                        
                        document.getElementById('sheet-music-btn').classList.remove('hidden');
                        renderRegions();
                        if (typeof window.updateSheetWindowUI === 'function') window.updateSheetWindowUI();
                        
                        if (data.videoName) {
                            currentVideoName = data.videoName;
                            pendingImportData = data;
                            // 若沒有一起拉入影片，才提醒選擇影片
                            if (!videoFile) {
                                setTimeout(() => {
                                    alert(`請選擇對應的影片檔 / Please select the corresponding video file:\n\n👉 ${data.videoName}`);
                                    document.getElementById('video-upload').click();
                                }, 50);
                            }
                        } else {
                            clips = data.clips;
                            saveState();
                            renderTimeline();
                        }
                        resolve();
                    };
                    reader.readAsText(jsonFile);
                });
            }

            // 2. 處理影片 (載入後自動觸發 loadedmetadata 讀取上面的 pendingImportData)
            if (videoFile) {
                currentVideoName = videoFile.name;
                const url = URL.createObjectURL(videoFile);
                video.src = url;
                video.load();
                extractAudioWaveform(videoFile);
            }

            // 3. 處理 PDF 樂譜 (開啟視窗並傳入資料)
            if (pdfFile) {
                const pdfReader = new FileReader();
                pdfReader.onload = function() {
                    const typedarray = new Uint8Array(this.result);
                    window.pendingPdfBuffer = typedarray; 

                    // 觸發開啟樂譜視窗
                    document.getElementById('sheet-music-btn').click();

                    // 輪詢等待子視窗就緒後，直接自動載入 PDF
                    const checkInterval = setInterval(() => {
                        if (sheetWindow && !sheetWindow.closed && sheetWindow.loadPdfInWindowGlobally) {
                            clearInterval(checkInterval);
                            sheetWindow.loadPdfInWindowGlobally(window.pendingPdfBuffer);
                            window.pendingPdfBuffer = null;
                        }
                    }, 200);
                };
                pdfReader.readAsArrayBuffer(pdfFile);
            }
        }

        // 產生播放速度按鈕
        const speedButtonsContainer = document.getElementById('speed-buttons');
        [0.5, 0.8, 1.0, 2.0, 3.0, 4.0].forEach(s => {
            const btn = document.createElement('button');
            btn.className = "speed-btn px-3 py-1.5 mx-0.5 rounded-lg text-sm font-bold transition-all border border-gray-600 bg-gray-700 text-gray-300 hover:bg-blue-500 hover:text-white";
            btn.dataset.speed = s.toFixed(1);
            btn.textContent = s.toFixed(1) + 'x';
            btn.onclick = () => updateSpeed(s);
            speedButtonsContainer.appendChild(btn);
        });
        
        // 載入時預設觸發一次 1.0x 以初始化選取外觀
        updateSpeed(1.0);

        // 預設開啟預覽
        isHoverPreview = true;

        // --- 多國語言設定 ---
        const i18nData = {
            tw: {
                appTitle: "老人的播放器",
                loadVideo: "載入影片",
                export: "匯出",
                import: "匯入",
                modeLabel: "當前模式:",
                modeA: "選取 (A)",
                modeB: "分割 (B)",
                helpA: "選取模式",
                helpB: "分割模式",
                helpL: "左全選",
                helpR: "右全選",
                helpDel: "刪除",

                helpShift: "兩點框選",
                keySpace: "空白鍵",
                helpSpace: "播放/暫停",
                defineRegion: "定義區間",
                zoomFit: "一鍵填滿 (適應螢幕)",
                zoomOut: "縮小",

                promptRegion: "請輸入區域名稱:",

            },
            en: {

                modeA: "Select (A)",

                helpA: "Select Mode",
